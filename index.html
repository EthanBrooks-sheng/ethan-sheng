<!DOCTYPE html>
<html>
    <head lang="zh-CN">
        <title>EthanBrooks-sheng的个人主页</title> 
        <link rel="stylesheet" href="CSS/style.css">
        <!--标签栏图标-->
    </head>
    <body>
        <nav class="navbar">
            <div class="nav-logo">
                <a href="#">myWebsite</a>
            </div>
            
            <ul class="nav-links">
                <li><a href="#" class="active">首页</a></li>
                <li><a href="#">关于我</a></li>
                <li><a href="#">文章</a></li>
                <li><a href="#">你好</a></li>
            </ul>

            <div class="nav-btn">
                <a href="#" class="btn">联系我</a>
            </div>
        </nav>

        <header class="picture-section">
            <div class="glass-card">
                <h1>每个成功人士的背后都有一条脊椎</h1>
            </div>
        </header>

        <section class="intro-section">
            <h2 class="intro-title">始于...</h2>
            
            <div class="intro-content">
                <div class="intro-image">
                    <img src="..\images\best.jpg" alt="简介图片">
                </div>
                <div class="intro-text">
                    <p>现在是2026年6月8日，是这个网站诞生之日。</p>
                    <p>今年是我在大学的第二年，用这个网站记录我对生活的热爱和思考，此后每点进这个网站，也许往事就历历在目了。</p>
                </div>
            </div>
        </section>
        
        <main class="grid-container">
            <section class="grid-item item-1">
                <h2>关于我</h2>
                <p>你想知道的，都不在这里</p>
            </section>
            <section class="grid-item item-2">
                <h2>文章</h2>
                <p>我的一些记录</p>
            </section>
            <section class="grid-item item-3">
                <h2>项目作品</h2>
                <p>暂时还没有</p>
            </section>
            <section class="grid-item item-4">
                <h2>你好</h2>
                <p>一些我使用过的资源</p>
            </section>
        </main>
        
    <script>
        // 1. 创建视口观察器
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('show'); // 进入视口时贴上 .show 标签
                    observer.unobserve(entry.target);   // 动画只执行一次，随后解除观察
                }
            });
        }, {
            threshold: 0.15 // 露出 15% 时触发
        });

        // 2. 获取这三个需要动画的元素
        const introTitle = document.querySelector('.intro-title');
        const introImage = document.querySelector('.intro-image');
        const introText = document.querySelector('.intro-text');

        // 3. 统一送进观察器（做个安全检查，防止页面找不到元素报错）
        if (introTitle) observer.observe(introTitle);
        if (introImage) observer.observe(introImage);
        if (introText) observer.observe(introText);
    </script>
    </body>
</html>
